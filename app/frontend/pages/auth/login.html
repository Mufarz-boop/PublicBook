<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PublicBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      /* Orange Palette */
      --orange-50: #fff7ed;
      --orange-100: #ffedd5;
      --orange-200: #fed7aa;
      --orange-300: #fdba74;
      --orange-400: #fb923c;
      --orange-500: #f97316;
      --orange-600: #ea580c;
      --orange-700: #c2410c;
      --orange-800: #9a3412;
      --amber-300: #fcd34d;
      --amber-400: #fbbf24;
      --amber-500: #f59e0b;

      /* Neutral */
      --white: #ffffff;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;

      /* Spacing Scale */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 28px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;

      /* Radius Scale */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;
      --radius-full: 9999px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --shadow-xl: 0 16px 48px rgba(0,0,0,0.16);
      --shadow-orange: 0 6px 24px rgba(234, 88, 12, 0.35);
      --shadow-orange-hover: 0 10px 32px rgba(234, 88, 12, 0.45);
      --shadow-focus: 0 0 0 4px rgba(249, 115, 22, 0.08);

      /* Transitions */
      --transition-fast: 0.15s ease;
      --transition-base: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    html { 
      -webkit-font-smoothing: antialiased; 
      -moz-osx-font-smoothing: grayscale; 
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('../../assets/images/bg/Background PublicBook.jpg') center/cover no-repeat fixed;
      position: relative;
      overflow: hidden;
      padding: var(--space-5);
    }

    /* Background Overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg, 
        rgba(0,0,0,0.45) 0%, 
        rgba(120,53,15,0.35) 50%, 
        rgba(0,0,0,0.5) 100%
      );
      z-index: 0;
    }

    /* ============================================
       LOGIN CARD
       ============================================ */
    .login-card {
      display: flex;
      width: 100%;
      max-width: 872px;
      height: 512px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: var(--radius-2xl);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 
        var(--shadow-xl),
        inset 0 1px 0 rgba(255,255,255,0.4);
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardEnter {
      from { 
        opacity: 0; 
        transform: translateY(24px) scale(0.97); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
    }

    /* ============================================
       LEFT SIDE - IMAGE
       ============================================ */
    .card-left {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: none;
    }

    .card-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 70%,
        rgba(255,255,255,0.15) 100%
      );
      pointer-events: none;
    }

    .card-left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-card:hover .card-left img {
      transform: scale(1.04);
    }

    /* ============================================
       RIGHT SIDE - FORM
       ============================================ */
    .card-right {
      flex: 1;
      padding: var(--space-8) var(--space-10);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ----------------------------------------
       BRAND HEADER
       ---------------------------------------- */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: var(--space-7);
      animation: fadeUp 0.5s 0.15s both;
    }

    .logo-wrapper {
      width: 88px;
      height: 88px;
      border-radius: var(--radius-full);
      overflow: hidden;
      transition: transform var(--transition-slow);
      border: 3px solid rgba(255,255,255,0.6);
      box-shadow: var(--shadow-md);
    }

    .logo-wrapper:hover {
      transform: scale(1.06) rotate(-2deg);
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ----------------------------------------
       HEADING
       ---------------------------------------- */
    .login-heading {
      text-align: center;
      margin-bottom: var(--space-6);
      animation: fadeUp 0.5s 0.25s both;
    }

    @keyframes fadeUp {
      from { 
        opacity: 0; 
        transform: translateY(12px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    .login-heading h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: var(--space-1);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .login-heading p {
      font-size: 13px;
      color: var(--gray-400);
      font-weight: 400;
      letter-spacing: 0.15px;
    }

    /* ----------------------------------------
       FORM
       ---------------------------------------- */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      animation: fadeUp 0.5s 0.35s both;
    }

    .input-group {
      position: relative;
    }

    .input-group i {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 14px;
      transition: color var(--transition-base);
      z-index: 2;
      width: 16px;
      text-align: center;
    }

    .input-group input {
      width: 100%;
      padding: 13px var(--space-4) 13px 46px;
      background: var(--gray-50);
      border: 2px solid var(--gray-100);
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      color: var(--gray-800);
      transition: all var(--transition-base);
      outline: none;
    }

    .input-group input::placeholder {
      color: var(--gray-300);
      font-weight: 400;
      font-size: 13px;
    }

    .input-group input:hover {
      border-color: var(--gray-200);
      background: var(--white);
    }

    .input-group input:focus {
      background: var(--white);
      border-color: var(--orange-300);
      box-shadow: var(--shadow-focus);
    }

    .input-group input:focus ~ i,
    .input-group input:not(:placeholder-shown) ~ i {
      color: var(--orange-500);
    }

    /* ----------------------------------------
       FORGOT PASSWORD
       ---------------------------------------- */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: calc(var(--space-1) * -1);
      margin-bottom: var(--space-1);
    }

    .forgot-link {
      font-size: 11.5px;
      color: var(--gray-400);
      text-decoration: none;
      font-weight: 500;
      transition: all var(--transition-base);
      letter-spacing: 0.2px;
      position: relative;
      padding-bottom: 1px;
    }

    .forgot-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1.5px;
      background: var(--orange-500);
      transition: width var(--transition-base);
    }

    .forgot-link:hover {
      color: var(--orange-600);
    }

    .forgot-link:hover::after {
      width: 100%;
    }

    /* ----------------------------------------
       SUBMIT BUTTON
       ---------------------------------------- */
    .btn-submit {
      width: 100%;
      padding: 14px var(--space-4);
      margin-top: var(--space-1);
      background: linear-gradient(135deg, var(--orange-600), var(--orange-500));
      color: var(--white);
      border: none;
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: var(--shadow-orange);
      transition: all var(--transition-base);
      position: relative;
      overflow: hidden;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.2),
        transparent
      );
      transition: left 0.7s ease;
    }

    .btn-submit:hover::before {
      left: 100%;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-orange-hover);
    }

    .btn-submit:active {
      transform: translateY(0);
      box-shadow: 0 4px 16px rgba(234, 88, 12, 0.3);
    }

    .btn-submit:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
    }

    /* ----------------------------------------
       DIVIDER
       ---------------------------------------- */
    .divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-5) 0;
      animation: fadeUp 0.5s 0.45s both;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(
        to right, 
        transparent, 
        var(--gray-200), 
        transparent
      );
    }

    .divider-text {
      font-size: 11px;
      color: var(--gray-400);
      font-weight: 500;
      white-space: nowrap;
    }

    /* ----------------------------------------
       REGISTER SECTION - UNIFIED THEME
       ---------------------------------------- */
    .register-section {
      text-align: center;
      animation: fadeUp 0.5s 0.55s both;
    }

    .register-main {
      font-size: 13px;
      color: var(--gray-500);
      font-weight: 500;
      line-height: 1.6;
    }

    .register-main a {
      color: var(--orange-500);
      text-decoration: none;
      font-weight: 700;
      transition: all var(--transition-base);
      position: relative;
      padding-bottom: 1px;
    }

    .register-main a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--orange-500), var(--amber-500));
      transition: width var(--transition-base);
    }

    .register-main a:hover {
      color: var(--orange-700);
    }

    .register-main a:hover::after {
      width: 100%;
    }

    .register-sub {
      margin-top: var(--space-3);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 12px;
      color: var(--gray-400);
      text-decoration: none;
      font-weight: 500;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-sm);
      border: 1px solid var(--gray-200);
      background: rgba(255,255,255,0.5);
      transition: all var(--transition-base);
    }

    .register-sub:hover {
      color: var(--gray-600);
      border-color: var(--gray-300);
      background: rgba(255,255,255,0.8);
    }

    .register-sub i {
      font-size: 12px;
      opacity: 0.7;
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (min-width: 768px) {
      .card-left {
        display: block;
      }
    }

    @media (max-width: 767px) {
      body {
        padding: var(--space-4);
        align-items: flex-start;
        padding-top: var(--space-8);
        padding-bottom: var(--space-8);
      }

      .login-card {
        border-radius: var(--radius-xl);
        height: auto;
        max-width: 412px;
        min-height: 480px;
      }

      .card-right {
        padding: var(--space-8) var(--space-6);
      }

      .login-heading h1 {
        font-size: 22px;
      }

      .brand-header {
        margin-bottom: var(--space-6);
      }

      .logo-wrapper {
        width: 76px;
        height: 76px;
      }
    }

    @media (max-width: 380px) {
      .card-right {
        padding: var(--space-6) var(--space-5);
      }

      .login-heading h1 {
        font-size: 20px;
      }

      .input-group input {
        padding: 12px var(--space-3) 12px 42px;
      }

      .logo-wrapper {
        width: 68px;
        height: 68px;
      }
    }
  </style>
<base target="_blank">
</head>
<body>

  <div class="login-card">

    <!-- Left Side: Image -->
    <div class="card-left">
      <img src="../../assets/images/bg/login side.jpg" alt="Ruang Kerja Modern">
    </div>

    <!-- Right Side: Form -->
    <div class="card-right">

      <!-- Brand Header -->
      <div class="brand-header">
        <div class="logo-wrapper">
          <img src="../../assets/images/icons/Icon PublicBook.jpg" alt="PublicBook Logo">
        </div>
      </div>

      <!-- Heading -->
      <div class="login-heading">
        <h1>Welcome Back</h1>
        <p>Silahkan masuk ke akun anda</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">

        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input 
            type="email" 
            id="email" 
            placeholder="nama@gmail.com" 
            required
            autocomplete="email"
          >
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input 
            type="password" 
            id="password" 
            placeholder="Password anda" 
            required
            autocomplete="current-password"
          >
        </div>

        <div class="forgot-row">
          <a href="#" class="forgot-link">Lupa Password?</a>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
          Masuk
        </button>

      </form>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">atau</span>
        <div class="divider-line"></div>
      </div>

      <!-- Register Links -->
      <div class="register-section">
        <p class="register-main">
          Belum punya akun? <a href="{{ url_for('auth_routes.register') }}">Daftar sekarang</a>
        </p>
        <a href="{{ url_for('static_routes.index') }}" class="register-sub">
          <i class="fas fa-arrow-left"></i>
          Kembali ke Landing Page
        </a>
      </div>

    </div>
  </div>

  <script>
    /**
     * Handle login form submission
     */
    function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnSubmit');
      const originalText = btn.innerText;

      if (!email || !password) {
        shakeElement(btn);
        return;
      }

      // Loading state
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="margin-right:8px;"></i>Memuat...';
      btn.disabled = true;

      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.disabled = false;
        window.location.href = '/dashboard';
      }, 1800);
    }

    /**
     * Shake animation for error feedback
     */
    function shakeElement(element) {
      element.style.animation = 'shake 0.5s ease';
      setTimeout(() => {
        element.style.animation = '';
      }, 500);
    }
  </script>

</body>
</html>
