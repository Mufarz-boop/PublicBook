<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PublicBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --primary-light: #fb923c;
      --bg-dark: #0f172a;
      --bg-card: #fff7ed;
      --text-dark: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --input-bg: #f1f5f9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('https://images.stockcake.com/public/b/7/7/b77b71ad-7dec-4ba0-9065-df22bd2c37e0_large/sunny-home-office-stockcake.jpg') center/cover no-repeat fixed;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(2px);
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      margin: 20px;
      animation: fadeInUp 0.8s ease forwards;
    }

    .login-card {
      display: flex;
      background: var(--bg-card);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
      min-height: 520px;
    }

    /* ===== LEFT SIDE - IMAGE ===== */
    .login-image {
      flex: 1;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .login-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .login-card:hover .login-image img {
      transform: scale(1.03);
    }

    .login-image::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.15) 0%, transparent 60%);
    }

    /* ===== RIGHT SIDE - FORM ===== */
    .login-form-wrapper {
      flex: 1;
      min-width: 0;
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-box {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      position: relative;
      box-shadow: 0 8px 24px rgba(30, 58, 95, 0.3);
    }

    .logo-box::before {
      content: '';
      position: absolute;
      top: -4px;
      right: -4px;
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box::after {
      content: '+';
      position: absolute;
      top: -4px;
      right: -4px;
      width: 24px;
      height: 24px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box i {
      font-size: 32px;
      color: white;
    }

    .logo-section h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .logo-section p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 16px;
      position: relative;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      font-size: 15px;
      z-index: 2;
      transition: color 0.3s ease;
    }

    .form-group:focus-within .input-icon {
      color: var(--primary);
    }

    .form-control {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 2px solid transparent;
      border-radius: 12px;
      background: var(--input-bg);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      transition: all 0.3s ease;
      outline: none;
    }

    .form-control::placeholder {
      color: #94a3b8;
      font-size: 13px;
    }

    .form-control:focus {
      border-color: var(--primary-light);
      background: white;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(249, 115, 22, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(249, 115, 22, 0.4);
    }

    .btn-login:hover::before {
      left: 100%;
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .register-link a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .login-card {
        flex-direction: column;
        max-height: none;
      }

      .login-image {
        height: 200px;
        min-height: 200px;
      }

      .login-form-wrapper {
        padding: 36px 28px;
      }
    }

    @media (max-width: 480px) {
      .login-form-wrapper {
        padding: 28px 20px;
      }

      .logo-section h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <!-- Left Side - Image -->
      <div class="login-image">
        <img src="https://images.stockcake.com/public/b/7/7/b77b71ad-7dec-4ba0-9065-df22bd2c37e0_large/sunny-home-office-stockcake.jpg" alt="Office Workspace">
      </div>

      <!-- Right Side - Form -->
      <div class="login-form-wrapper">
        <div class="logo-section">
          <div class="logo-box">
            <i class="fas fa-building-columns"></i>
          </div>
          <h2>Welcome Back</h2>
          <p>Silahkan masuk ke akun anda</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" class="form-control" placeholder="nama@gmail.com" required>
            </div>
          </div>

          <div class="form-group">
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" class="form-control" placeholder="Password anda" required>
            </div>
          </div>

          <div class="form-group">
            <div class="input-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" class="form-control" placeholder="Kode anda" required>
            </div>
          </div>

          <button type="submit" class="btn-login">Masuk</button>
        </form>

        <div class="register-link">
          Belum punya akun? <a href="register.html">Daftar sekarang</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      // Animation feedback
      const btn = e.target.querySelector('.btn-login');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memuat...';
      btn.style.opacity = '0.8';
      
      setTimeout(() => {
        btn.innerHTML = 'Masuk';
        btn.style.opacity = '1';
        // Redirect or handle login logic here
        // window.location.href = '../dashboard.html';
      }, 1500);
    }
  </script>

</body>
</html>
